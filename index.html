<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cozy Productivity Hub</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Background Video -->
  <video id="background-video" autoplay muted loop>
    <source src="assets/cozy.mp4" type="video/mp4">
    Your browser does not support the video tag.
  </video>

  <!-- Background Music -->
  <audio id="bg-music" loop autoplay>
    <source src="assets/cozy.mp3" type="audio/mp3">
  </audio>

  <header>
    <h1>Cozy Productivity Hub</h1>
    <p>Focus, track tasks, and stay productive</p>
  </header>

  <main>
    <!-- Mood Selector -->
    <section>
      <h2>Select Your Mood</h2>
      <select id="mood-selector">
        <option value="cozy">Cozy</option>
        <option value="focus">Focused</option>
        <option value="relaxed">Relaxed</option>
        <option value="energetic">Energetic</option>
      </select>
      <p>Background video, music, and colors change with your mood.</p>
    </section>

    <!-- Music Control -->
    <section>
      <h2>Music Control</h2>
      <button id="music-toggle">Pause Music</button>
    </section>

    <!-- Tasks -->
    <section id="tasks">
  <h2>Task List</h2>
  <ul id="task-list"></ul>
  <input type="text" id="new-task" placeholder="Add a new task...">
  <button onclick="addTask()">Add Task</button>
  <button onclick="resetTasks()">Reset Tasks</button>
</section>

    <!-- Notes -->
    <section id="notes">
      <h2>Quick Notes</h2>
      <textarea id="notes-area" placeholder="Write your notes here..."></textarea>
      <button onclick="saveNotes()">Save Notes</button>
    </section>

    <!-- Timer -->
    <section id="timer-section">
      <h2>Focus Timer</h2>
      <div>
        <input type="number" id="timer-minutes" placeholder="Minutes" min="1" style="width:100px;">
        <button onclick="startTimer()">Start</button>
        <button onclick="pauseTimer()">Pause</button>
        <button onclick="resetTimer()">Reset</button>
      </div>
      <div id="timer-display">00:00</div>
    </section>
  </main>

  <footer>
    &copy; 2026 Cozy Productivity Hub
  </footer>

  <script src="script.js"></script>
</body>
</html>
